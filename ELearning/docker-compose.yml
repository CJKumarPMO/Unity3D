version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: elearning
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  user-service:
    build: ./services/user-service
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/elearning
    depends_on:
      - postgres

  course-service:
    build: ./services/course-service
    ports:
      - "3002:3002"
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/elearning
    depends_on:
      - postgres

  enrollment-service:
    build: ./services/enrollment-service
    ports:
      - "3003:3003"
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/elearning
    depends_on:
      - postgres

  api-gateway:
    build: ./services/api-gateway
    ports:
      - "3000:3000"
    depends_on:
      - user-service
      - course-service
      - enrollment-service

  frontend:
    build: ./frontend
    ports:
      - "3004:3004"
    depends_on:
      - api-gateway

volumes:
  postgres_data:
